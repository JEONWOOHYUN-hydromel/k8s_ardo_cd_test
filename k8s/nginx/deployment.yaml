apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-nginx
  namespace: k8s-lab
  labels:
    app: hello-nginx
spec:
  replicas: 4
  selector:
    matchLabels:
      app: hello-nginx
  template:
    metadata:
      labels:
        app: hello-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
